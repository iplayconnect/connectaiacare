# ConnectaIACare — stack de produção (co-habitada na Hostinger com isolamento lógico)
#
# Arquitetura de redes (ADR-015):
#   - infra_proxy (EXTERNAL): rede compartilhada com Traefik da Hostinger. Só `api`
#     e `frontend` se pluga nela → recebem tráfego público HTTPS via Traefik.
#   - connectaiacare_internal (BRIDGE local): postgres, redis, api e frontend.
#     É a rede PRIVADA da ConnectaIACare. O PG e o Redis NÃO são acessíveis por
#     nenhum outro container do ConnectaIA SaaS porque só existem aqui dentro.
#
# Isolamento de dados (LGPD — dado sensível de saúde):
#   - Container postgres DEDICADO (não reusa `infra-postgres-1` do SaaS)
#   - Volume próprio (`connectaiacare_pg_data`)
#   - Credenciais próprias (via .env)
#   - Backup independente (documentado no runbook)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: connectaiacare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: connectaiacare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - connectaiacare_pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    # Porta NÃO exposta no host em produção — acesso só via rede interna.
    # Para acesso de emergência, usar `docker exec` ou túnel SSH ad-hoc.
    networks:
      - connectaiacare_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d connectaiacare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: connectaiacare-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - connectaiacare_redis_data:/data
    # Porta NÃO exposta no host em produção.
    networks:
      - connectaiacare_internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectaiacare-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      REDIS_URL: redis://redis:6379/5
    volumes:
      # Áudios WhatsApp persistidos pra reproduzir no painel (reports audio_url)
      - connectaiacare_audio_storage:/app/storage/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Porta NÃO exposta no host — Traefik alcança via rede `infra_proxy`.
    networks:
      - connectaiacare_internal  # Acessa PG e Redis
      - infra_proxy              # Traefik alcança por aqui
    labels:
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-api.rule: "Host(`demo.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-api.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-api.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-api.loadbalancer.server.port: "5055"
      # Redirect HTTP → HTTPS
      traefik.http.routers.connectaiacare-api-http.rule: "Host(`demo.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-api-http.entrypoints: "web"
      traefik.http.routers.connectaiacare-api-http.middlewares: "connectaiacare-https-redirect"
      traefik.http.middlewares.connectaiacare-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.connectaiacare-https-redirect.redirectscheme.permanent: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* precisa ser BUILD arg pra ser inlineado no bundle JS
        # do browser. Sem isso, fetch client-side vira relativo (care.* em vez
        # de demo.*) e endpoints retornam 404.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://demo.connectaia.com.br}
    container_name: connectaiacare-frontend
    restart: unless-stopped
    environment:
      # Browser (Client Components): hostname público — também em runtime por
      # robustez, mas o valor que importa é o do build arg acima.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://demo.connectaia.com.br}
      # Server Components (SSR dentro do container): service name Docker
      INTERNAL_API_URL: http://api:5055
    depends_on:
      - api
    networks:
      - connectaiacare_internal  # Alcança a api pela rede interna (SSR)
      - infra_proxy              # Traefik alcança por aqui
    labels:
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-web.rule: "Host(`care.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-web.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-web.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-web.loadbalancer.server.port: "3000"
      # Redirect HTTP → HTTPS
      traefik.http.routers.connectaiacare-web-http.rule: "Host(`care.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-web-http.entrypoints: "web"
      traefik.http.routers.connectaiacare-web-http.middlewares: "connectaiacare-web-https-redirect"
      traefik.http.middlewares.connectaiacare-web-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.connectaiacare-web-https-redirect.redirectscheme.permanent: "true"

volumes:
  connectaiacare_pg_data:
  connectaiacare_redis_data:
  connectaiacare_audio_storage:

networks:
  # Rede PRIVADA da ConnectaIACare (isolamento LGPD).
  # Nenhum outro container do host enxerga PG ou Redis.
  connectaiacare_internal:
    driver: bridge
  # Rede PÚBLICA compartilhada com Traefik (pré-existente na VPS).
  # Só `api` e `frontend` se pluga — PG/Redis ficam fora.
  infra_proxy:
    external: true
