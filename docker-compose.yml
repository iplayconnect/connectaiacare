# ConnectaIACare — stack de produção (co-habitada na Hostinger com isolamento lógico)
#
# Arquitetura de redes (ADR-015):
#   - infra_proxy (EXTERNAL): rede compartilhada com Traefik da Hostinger. Só `api`
#     e `frontend` se pluga nela → recebem tráfego público HTTPS via Traefik.
#   - connectaiacare_internal (BRIDGE local): postgres, redis, api e frontend.
#     É a rede PRIVADA da ConnectaIACare. O PG e o Redis NÃO são acessíveis por
#     nenhum outro container do ConnectaIA SaaS porque só existem aqui dentro.
#
# Isolamento de dados (LGPD — dado sensível de saúde):
#   - Container postgres DEDICADO (não reusa `infra-postgres-1` do SaaS)
#   - Volume próprio (`connectaiacare_pg_data`)
#   - Credenciais próprias (via .env)
#   - Backup independente (documentado no runbook)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: connectaiacare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: connectaiacare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - connectaiacare_pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    # Porta NÃO exposta no host em produção — acesso só via rede interna.
    # Para acesso de emergência, usar `docker exec` ou túnel SSH ad-hoc.
    networks:
      - connectaiacare_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d connectaiacare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: connectaiacare-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - connectaiacare_redis_data:/data
    # Porta NÃO exposta no host em produção.
    networks:
      - connectaiacare_internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectaiacare-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      REDIS_URL: redis://redis:6379/5
      # Vertex AI auth (mode auto-detectado em embedding_service.py:
      # se GOOGLE_APPLICATION_CREDENTIALS apontar pra arquivo válido,
      # usa Vertex; senão fallback Gemini API via GOOGLE_API_KEY).
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/secrets/vertex-sa.json}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-connectaiacare-prod}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
    volumes:
      # Áudios WhatsApp persistidos pra reproduzir no painel (reports audio_url)
      - connectaiacare_audio_storage:/app/storage/audio
      # SA key Vertex AI (read-only). Path host=/root/connectaiacare/secrets,
      # path container=/secrets. Apenas leitura — workers nem precisam de write.
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      sofia-service:
        condition: service_started
    # Porta NÃO exposta no host — Traefik alcança via rede `infra_proxy`.
    networks:
      - connectaiacare_internal  # Acessa PG, Redis e sofia-service
      - infra_proxy              # Traefik alcança por aqui
    labels:
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-api.rule: "Host(`demo.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-api.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-api.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-api.loadbalancer.server.port: "5055"
      # Redirect HTTP → HTTPS
      traefik.http.routers.connectaiacare-api-http.rule: "Host(`demo.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-api-http.entrypoints: "web"
      traefik.http.routers.connectaiacare-api-http.middlewares: "connectaiacare-https-redirect"
      traefik.http.middlewares.connectaiacare-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.connectaiacare-https-redirect.redirectscheme.permanent: "true"

  # ════════════════════════════════════════════════════════════════════
  # sofia-inbound-worker · consome sofia:inbound (Phase B Super Sofia)
  # Múltiplas réplicas pra escala horizontal. Idempotente, ack manual.
  # ════════════════════════════════════════════════════════════════════
  sofia-inbound-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: connectaiacare-api  # mesma imagem do api
    restart: unless-stopped
    command: python -m src.workers.sofia_inbound_worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      REDIS_URL: redis://redis:6379/5
      WORKER_BLOCK_MS: ${WORKER_BLOCK_MS:-5000}
      WORKER_BATCH: ${WORKER_BATCH:-10}
      # Vertex AI auth (ver comentário no service `api`)
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/secrets/vertex-sa.json}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-connectaiacare-prod}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
    volumes:
      - ./secrets:/secrets:ro
    # Override do healthcheck herdado do Dockerfile (curl localhost:5055/health
    # da API). Worker não tem HTTP server. PR #102 tentou pgrep mas a
    # imagem slim não tem procps (pgrep/ps/top) → exit 127 sempre,
    # workers continuavam "unhealthy".
    # Fix 2026-05-03 (PR #109): usa python (sempre presente) pra checar
    # PID 1 (o próprio worker é PID 1 no container). os.kill(pid, 0) NÃO
    # envia signal — só verifica se o processo existe (exception=morto,
    # sucesso=vivo). Não detecta loop de timeout no Redis (Docker restart
    # cobre worker morto), mas pelo menos não mente "unhealthy".
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_started  # garante DB migrations e config
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - connectaiacare_internal
    deploy:
      replicas: ${SOFIA_INBOUND_WORKER_REPLICAS:-2}

  # ════════════════════════════════════════════════════════════════════
  # delivery-worker · consome sofia:outbound → Evolution send
  # ════════════════════════════════════════════════════════════════════
  delivery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: connectaiacare-api
    restart: unless-stopped
    command: python -m src.workers.delivery_worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      REDIS_URL: redis://redis:6379/5
      WORKER_BLOCK_MS: ${WORKER_BLOCK_MS:-5000}
      WORKER_BATCH: ${WORKER_BATCH:-10}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/secrets/vertex-sa.json}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-connectaiacare-prod}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
    volumes:
      - ./secrets:/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - connectaiacare_internal
    deploy:
      replicas: ${DELIVERY_WORKER_REPLICAS:-1}

  sofia-service:
    build:
      context: ./sofia-service
      dockerfile: Dockerfile
    container_name: connectaiacare-sofia-service
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Reusa o Postgres do Care via rede interna (não expõe porta no host).
      # LGPD: dados de saúde nunca saem da rede privada connectaiacare_internal.
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      LOG_LEVEL: INFO
      # SOFIA_LLM_MODEL=gemini-3-flash-preview default no llm_client.
      # SOFIA_VOICE_PROVIDER=grok|gemini (default grok).
      # SOFIA_GROK_VOICE_MODEL=grok-voice-think-fast-1.0 default.
      # SOFIA_GROK_VOICE=ara default.
      # XAI_API_KEY: chave xAI emitida em console.x.ai (.env).
      # SOFIA_VOICE_MODEL=gemini-2.5-flash-native-audio-latest (fallback Gemini).
      # SOFIA_INTERNAL_KEY: shared secret api ↔ sofia-service (.env)
      SOFIA_VOICE_PROVIDER: ${SOFIA_VOICE_PROVIDER:-grok}
      XAI_API_KEY: ${XAI_API_KEY:-}
      # Vertex AI auth pra embedding worker do sofia-service
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/secrets/vertex-sa.json}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-connectaiacare-prod}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - connectaiacare_internal  # Postgres + comunicação interna do api.
      - infra_proxy              # Voice WS exposto via Traefik em
                                 # voice.connectaia.com.br (subdomínio próprio).
    labels:
      # Voz exposta em sofia-voice.connectaia.com.br pra browser conectar
      # WebSocket direto. Backend api emite token efêmero/JWT short-TTL pra
      # autenticar a conexão (X-Internal-Key inicial).
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-sofia-voice.rule: "Host(`sofia-voice.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-sofia-voice.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-sofia-voice.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-sofia-voice.loadbalancer.server.port: "5032"
      # Redirect HTTP → HTTPS
      traefik.http.routers.connectaiacare-sofia-voice-http.rule: "Host(`sofia-voice.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-sofia-voice-http.entrypoints: "web"
      traefik.http.routers.connectaiacare-sofia-voice-http.middlewares: "connectaiacare-voice-https-redirect"
      traefik.http.middlewares.connectaiacare-voice-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.connectaiacare-voice-https-redirect.redirectscheme.permanent: "true"

  # ════════════════════════════════════════════════════════════════════
  # voice-call-service — ligações telefônicas via SIP + Grok Realtime
  # ════════════════════════════════════════════════════════════════════
  voice-call-service:
    build:
      context: ./voice-call-service
      dockerfile: Dockerfile
    container_name: connectaiacare-voice-call
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      LOG_LEVEL: INFO
      VOIP_SIP_DOMAIN: ${VOIP_SIP_DOMAIN:-revendapbx.flux.net.br}
      VOIP_SIP_USER: ${VOIP_SIP_USER:-}
      VOIP_SIP_PASSWORD: ${VOIP_SIP_PASSWORD:-}
      # Caller ID (From) — nVoip exige Número Virtual; Flux aceita SIP_USER.
      VOIP_SIP_CALLER_ID: ${VOIP_SIP_CALLER_ID:-}
      # IP público pro SDP (Docker bridge NAT). 72.60.242.245 = host VPS.
      VOIP_PUBLIC_IP: ${VOIP_PUBLIC_IP:-72.60.242.245}
      XAI_API_KEY: ${XAI_API_KEY:-}
      # Modelo trocado de grok-voice-think-fast-1.0 (29/04) pra
      # grok-voice-fast-1.0 (sem think). O modo think causava
      # "response.done vazio" — Sofia ficava muda no meio da conversa.
      # Sem think = comportamento mais determinístico.
      SOFIA_GROK_VOICE_MODEL: ${SOFIA_GROK_VOICE_MODEL:-grok-voice-fast-1.0}
      SOFIA_GROK_VOICE: ara
      # VAD threshold do Grok Server VAD. Default original do Grok era
      # 0.5/700ms. Reduzido pra 500ms (29/04) pra reduzir lag percebido
      # entre cuidador parar de falar e Sofia responder. Threshold 0.5
      # mantido — não houve queixa de corte de fala.
      GROK_VAD_THRESHOLD: ${GROK_VAD_THRESHOLD:-0.5}
      GROK_VAD_SILENCE_DURATION_MS: ${GROK_VAD_SILENCE_DURATION_MS:-500}
      # Delay (ms) antes da Sofia falar a saudação ao atender. Default
      # 1500ms = ~1.5s — evita atropelar paciente que diz "alô" e dá
      # tempo do canal de áudio "abrir" em algumas operadoras. 0
      # restaura comportamento original (Sofia fala IMEDIATAMENTE
      # ao detectar CONFIRMED).
      GROK_KICKOFF_DELAY_MS: ${GROK_KICKOFF_DELAY_MS:-1500}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - connectaiacare_internal
      - infra_proxy
    ports:
      # SIP signaling (5061 host pra evitar conflito com voip-service na 5060)
      - "5061:5060/udp"
      - "10500-10600:10500-10600/udp"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-voice-call-api.rule: "Host(`voice-call.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-voice-call-api.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-voice-call-api.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-voice-call-api.loadbalancer.server.port: "5040"

  livekit-agent-service:
    # Backend alternativo de voz: LiveKit Agents Cloud + SIP trunk Flux.
    # Coexiste com voice-call-service. Backend roteia via VOICE_BACKEND env.
    # Flag inicial OFF (profile gated) — sobe explicitamente com:
    #   docker compose --profile livekit up -d livekit-agent-service
    profiles:
      - livekit
    build:
      context: ./livekit-agent-service
      dockerfile: Dockerfile
    container_name: connectaiacare-livekit-agent
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/connectaiacare
      LOG_LEVEL: INFO
      # LiveKit Cloud
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_OUTBOUND_TRUNK_ID: ${LIVEKIT_OUTBOUND_TRUNK_ID:-}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-sofia-voice}
      # Pipeline plugins
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPGRAM_LANGUAGE: ${DEEPGRAM_LANGUAGE:-pt-BR}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-nova-2-general}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      TTS_PROVIDER: ${TTS_PROVIDER:-elevenlabs}
      TTS_VOICE_ID: ${TTS_VOICE_ID:-}
      # LLM (Grok via OpenAI-compatible API)
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.x.ai/v1}
      LLM_MODEL: ${LLM_MODEL:-grok-2-1212}
      LLM_API_KEY_ENV: XAI_API_KEY
      XAI_API_KEY: ${XAI_API_KEY:-}
      # Internal services
      SOFIA_SERVICE_URL: http://sofia-service:5030
      BACKEND_API_URL: http://api:5055
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - connectaiacare_internal
      - infra_proxy
    # Não expõe SIP — LiveKit Cloud é quem fala com Flux. Só expõe HTTP /dial
    # via Traefik pra backend interno chamar.
    labels:
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-livekit-agent.rule: "Host(`livekit-agent.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-livekit-agent.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-livekit-agent.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-livekit-agent.loadbalancer.server.port: "5042"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* precisa ser BUILD arg pra ser inlineado no bundle JS
        # do browser. Sem isso, fetch client-side vira relativo (care.* em vez
        # de demo.*) e endpoints retornam 404.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://demo.connectaia.com.br}
    container_name: connectaiacare-frontend
    restart: unless-stopped
    environment:
      # Browser (Client Components): hostname público — também em runtime por
      # robustez, mas o valor que importa é o do build arg acima.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://demo.connectaia.com.br}
      # Server Components (SSR dentro do container): service name Docker
      INTERNAL_API_URL: http://api:5055
    depends_on:
      - api
    networks:
      - connectaiacare_internal  # Alcança a api pela rede interna (SSR)
      - infra_proxy              # Traefik alcança por aqui
    labels:
      traefik.enable: "true"
      traefik.docker.network: "infra_proxy"
      traefik.http.routers.connectaiacare-web.rule: "Host(`care.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-web.entrypoints: "websecure"
      traefik.http.routers.connectaiacare-web.tls.certresolver: "letsencrypt"
      traefik.http.services.connectaiacare-web.loadbalancer.server.port: "3000"
      # Redirect HTTP → HTTPS
      traefik.http.routers.connectaiacare-web-http.rule: "Host(`care.connectaia.com.br`)"
      traefik.http.routers.connectaiacare-web-http.entrypoints: "web"
      traefik.http.routers.connectaiacare-web-http.middlewares: "connectaiacare-web-https-redirect"
      traefik.http.middlewares.connectaiacare-web-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.connectaiacare-web-https-redirect.redirectscheme.permanent: "true"

volumes:
  connectaiacare_pg_data:
  connectaiacare_redis_data:
  connectaiacare_audio_storage:

networks:
  # Rede PRIVADA da ConnectaIACare (isolamento LGPD).
  # Nenhum outro container do host enxerga PG ou Redis.
  connectaiacare_internal:
    driver: bridge
  # Rede PÚBLICA compartilhada com Traefik (pré-existente na VPS).
  # Só `api` e `frontend` se pluga — PG/Redis ficam fora.
  infra_proxy:
    external: true
