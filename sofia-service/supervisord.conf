[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:sofia-rest]
# Threads 16 (Phase D escala 2026-05-02): I/O-bound (LLM + DB).
# Threads são "free" em RAM, libera GIL em I/O wait. Pool postgres
# ajustado em persistence.py pra suportar (maxconn=20).
command=gunicorn --bind 0.0.0.0:5031 --workers 2 --threads 16 --timeout 60 sofia_app:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true

[program:sofia-voice]
command=uvicorn voice_app:app --host 0.0.0.0 --port 5032 --no-access-log
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
