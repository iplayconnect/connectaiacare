# ═══════════════════════════════════════════════════════════════════
# LLM Routing por Tarefa (ADR-025)
#
# Cada tarefa clínica ou de rotina escolhe seu próprio modelo baseado
# em critérios de criticidade vs custo. Mudar de modelo = editar YAML
# + restart API. Nenhum código muda.
#
# Formato: tasks.<task_name>.primary + fallbacks[] + params
#
# Priority order:
#   1. primary (se falhar ou indisponível)
#   2. fallbacks[] em ordem (tenta próximo até um funcionar)
#
# Providers suportados (via settings.llm_provider ou via LiteLLM proxy):
#   - anthropic/*         Claude Sonnet 4, 3.5 Sonnet, 3.5 Haiku
#   - openai/*            GPT-5.4 nano, 5.4 mini, 4o-mini
#   - google/*            Gemini 2.5 Flash, 2.5 Flash-Lite, 3.1 preview
#   - deepseek/*          Chat V3.2, Reasoner (APENAS tarefas ZERO-PHI)
# ═══════════════════════════════════════════════════════════════════

tasks:
  # ─── Clínico crítico — alucinação = incidente clínico ───

  soap_writer:
    description: "Gera SOAP estruturado a partir de transcrição da teleconsulta."
    primary: anthropic/claude-sonnet-4-20250514
    fallbacks:
      - anthropic/claude-3-5-haiku-20241022
      - openai/gpt-5.4-mini
    temperature: 0.15
    max_tokens: 6144
    response_format: json_object
    criticality: high

  prescription_validator:
    description: "Valida interações, Beers, alergias, dose geriátrica."
    primary: anthropic/claude-sonnet-4-20250514
    fallbacks:
      - openai/gpt-5.4-mini
      - google/gemini-2.5-flash
    temperature: 0.1
    max_tokens: 4096
    response_format: json_object
    criticality: high

  clinical_analysis:
    description: "Analisa relato do cuidador, classifica routine/attention/urgent/critical."
    primary: openai/gpt-5.4-mini
    fallbacks:
      - anthropic/claude-3-5-haiku-20241022
      - google/gemini-2.5-flash
    temperature: 0.1
    max_tokens: 4096
    response_format: json_object
    criticality: high

  # ─── Comunicação com paciente/família — tom importa ───

  patient_summary:
    description: "Reformula SOAP em linguagem simples e acolhedora pra família."
    primary: anthropic/claude-3-5-haiku-20241022
    fallbacks:
      - openai/gpt-5.4-mini
      - google/gemini-2.5-flash
    temperature: 0.3
    max_tokens: 5000
    response_format: json_object
    criticality: medium

  weekly_report:
    description: "Resumo semanal família (tom factual + acolhedor)."
    primary: openai/gpt-5.4-mini
    fallbacks:
      - google/gemini-2.5-flash-lite
      - anthropic/claude-3-5-haiku-20241022
    temperature: 0.4
    max_tokens: 6500
    response_format: json_object
    criticality: medium

  # ─── Vision — OCR de receitas/caixas ───

  prescription_ocr:
    description: "Extrai medicamentos de foto de receita/caixa/bula."
    primary: google/gemini-2.5-flash
    fallbacks:
      - anthropic/claude-sonnet-4-20250514  # só fallback pq vision dele é caro
      - openai/gpt-5.4-mini
    temperature: 0.1
    max_tokens: 4096
    response_format: json_object
    supports_vision: true
    criticality: high

  # ─── Rotina e extração — ZERO-PHI ok usar DeepSeek ───

  price_search_extraction:
    description: "Extrai ofertas de HTML scrapeado de farmácia. Sem PHI."
    # Promovido pra DeepSeek V4-Flash em 30/04 (era fallback). Mais barato
    # ($0.14/$0.28 vs Gemini Flash-Lite $0.10/$0.40) e contexto 1M ajuda
    # com HTML longo de farmácia. Sem PHI envolvido.
    primary: deepseek/deepseek-chat
    fallbacks:
      - google/gemini-2.5-flash-lite
      - openai/gpt-5.4-nano
    temperature: 0.1
    max_tokens: 2500
    response_format: json_object
    criticality: low

  intent_classifier_review:
    description: "Tier 2 do cascade — revalida classificação de T1 quando severity≥urgent ou T1 falha. Modelo com raciocínio (V4-Pro)."
    primary: deepseek/deepseek-reasoner
    fallbacks:
      - google/gemini-2.5-flash
      - anthropic/claude-3-5-haiku-20241022
    temperature: 0.0
    max_tokens: 1200
    response_format: json_object
    criticality: high

  intent_classifier_judge:
    description: "Tier 3 do cascade — juiz desempata T1 vs T2 quando há discordância. Arquitetura DIFERENTE pra reduzir correlação de erros (Anthropic). Sempre que disparar, notifica responsável."
    primary: anthropic/claude-3-5-haiku-20241022
    fallbacks:
      - google/gemini-2.5-flash
      - openai/gpt-5.4-mini
    temperature: 0.0
    max_tokens: 1500
    response_format: json_object
    criticality: high

  intent_classifier:
    description: "Extrai entidades + multiclassifica event_type (8 classes) de áudio do cuidador."
    # Trocado de openai/gpt-5.4-nano (não configurado) e gemini-flash-lite (gerava
    # JSON malformado em casos com mais info clínica) pra DeepSeek V4-Flash em
    # 2026-04-30 após investigação de falhas (4/4 casos críticos viraram
    # 'relato_geral' com Gemini Flash). DeepSeek é mais barato, mais rápido e
    # passou em todos os 4 testes críticos sem JSON parse error.
    primary: deepseek/deepseek-chat
    fallbacks:
      - google/gemini-2.5-flash      # mais robusto que flash-lite pra prompts longos
      - anthropic/claude-3-5-haiku-20241022  # arquitetura diferente — reduz correlação de erros
    temperature: 0.0
    max_tokens: 800   # 256 era pouco — prompt agora tem 11 campos
    response_format: json_object
    criticality: medium  # event_type errado = paciente em emergência rotulado como rotineiro

  followup_answer:
    description: "Responde textualmente ao cuidador durante evento ativo."
    primary: openai/gpt-5.4-mini
    fallbacks:
      - google/gemini-2.5-flash
    temperature: 0.2
    max_tokens: 1024
    response_format: json_object
    criticality: medium

  # ═══════════════════════════════════════════════════════════════════
  # Phase C — Super Sofia
  # ═══════════════════════════════════════════════════════════════════

  whatsapp_intent_classifier:
    description: "Classifica intent de phone anônimo no WhatsApp. 5 buckets: interesse_servico_b2c, interesse_servico_b2b, agendar_demo, suporte_cliente, spam_abuso, unclear. DeepSeek V4-Flash custo/latência."
    primary: deepseek/deepseek-chat
    fallbacks:
      - google/gemini-2.5-flash
    temperature: 0.1
    max_tokens: 256
    response_format: json_object
    criticality: low

  sofia_chat_response:
    description: "Resposta conversacional Sofia em chat WhatsApp/web (multi-turn). Sub-agents profile-aware passam contexto + tools. Sonnet pra qualidade conversacional."
    primary: anthropic/claude-sonnet-4-5
    fallbacks:
      - anthropic/claude-3-5-haiku-20241022
      - google/gemini-2.5-flash
    temperature: 0.4
    max_tokens: 2048
    response_format: text
    criticality: high

  sofia_chat_tool_decision:
    description: "Sofia decide se chama tool antes de texto livre. Saída JSON {action: text|tool, tool_name?, args?, text_after|text}. Haiku 4.5 primary (2026-05-02) — tool calling rigoroso + suporta cache_control nativo (aproveita cacheable_system do LLMRouter). Trocou de DeepSeek depois que test E2E F3 (Escalate humano) mostrou que DeepSeek NÃO chamava escalate_to_human_whatsapp mesmo com user pedindo 'quero falar com humano agora' explicitamente — agente ficava só em texto. GPT-5.4 mini fallback (function calling robusto + auto cache). Gemini Flash último recurso (mais barato, tool calling menos consistente)."
    primary: anthropic/claude-haiku-4-5-20251001
    fallbacks:
      - openai/gpt-5.4-mini
      - google/gemini-2.5-flash
    temperature: 0.0
    max_tokens: 1024
    response_format: json_object
    criticality: high


# ═══════════════════════════════════════════════════════════════════
# Configuração global
# ═══════════════════════════════════════════════════════════════════

global:
  # Timeout por chamada (segundos)
  default_timeout: 45

  # Retry em caso de 429/500/503 antes de cair no fallback
  retry_attempts: 2
  retry_backoff_base: 1.5  # exponencial

  # Logging de custo (desliga em dev pra não poluir)
  track_costs: true

  # Se nenhum modelo disponível, qual é o "modo degradado"?
  # 'fallback_offline' = retorna resposta stub pra sistema não quebrar
  # 'raise'            = propaga erro pro caller decidir
  on_all_failed: raise


# ═══════════════════════════════════════════════════════════════════
# Model catalog — metadata pra cost tracker e validação
# ═══════════════════════════════════════════════════════════════════

models:
  # ── Anthropic ──
  anthropic/claude-sonnet-4-20250514:
    provider: anthropic
    input_cost_per_1m: 3.00
    output_cost_per_1m: 15.00
    context_window: 200000
    supports_vision: true
    supports_json: true

  anthropic/claude-3-5-haiku-20241022:
    provider: anthropic
    input_cost_per_1m: 0.80
    output_cost_per_1m: 4.00
    context_window: 200000
    supports_vision: true
    supports_json: true

  # ── OpenAI ──
  openai/gpt-5.4-nano:
    provider: openai
    input_cost_per_1m: 0.05
    output_cost_per_1m: 0.20
    context_window: 128000
    supports_vision: false
    supports_json: true

  openai/gpt-5.4-mini:
    provider: openai
    input_cost_per_1m: 0.20
    output_cost_per_1m: 0.80
    context_window: 128000
    supports_vision: true
    supports_json: true

  openai/gpt-4o-mini:
    provider: openai
    input_cost_per_1m: 0.15
    output_cost_per_1m: 0.60
    context_window: 128000
    supports_vision: true
    supports_json: true

  # ── Google Gemini ──
  google/gemini-2.5-flash:
    provider: gemini
    model_id: gemini-2.5-flash
    input_cost_per_1m: 0.30
    output_cost_per_1m: 2.50
    context_window: 1000000
    supports_vision: true
    supports_json: true

  google/gemini-2.5-flash-lite:
    provider: gemini
    model_id: gemini-2.5-flash-lite
    input_cost_per_1m: 0.10
    output_cost_per_1m: 0.40
    context_window: 1000000
    supports_vision: true
    supports_json: true

  google/gemini-3.1-flash-lite:
    provider: gemini
    model_id: gemini-3.1-flash-lite-preview
    input_cost_per_1m: 0.25
    output_cost_per_1m: 1.50
    context_window: 1000000
    supports_vision: true
    supports_json: true
    is_preview: true

  # ── DeepSeek (V4 — política PHI a definir) ──
  # 2026-04-30: política revisitada. Argumento original era residência de
  # dados na China, mas TODOS os providers (OpenAI/Anthropic/Google) também
  # processam em servidores próprios fora do Brasil. allowed_for_phi
  # mantido como flag pra decisão de produto, mas em uso pra
  # intent_classifier (event_type) que é triagem necessária pra
  # priorização clínica. Plano: contratualizar DPA com DeepSeek antes
  # de expandir uso.
  deepseek/deepseek-chat:
    provider: deepseek
    model_id: deepseek-chat   # alias atual = V4-Flash
    input_cost_per_1m: 0.14   # V4-Flash cache miss
    output_cost_per_1m: 0.28
    context_window: 1000000
    supports_vision: false
    supports_json: true
    data_sovereignty: "China"
    allowed_for_phi: true     # revisado 2026-04-30 (mesmo standard dos demais providers)

  deepseek/deepseek-reasoner:
    provider: deepseek
    model_id: deepseek-reasoner   # alias atual = V4-Pro (com thinking)
    input_cost_per_1m: 0.435
    output_cost_per_1m: 0.87
    context_window: 1000000
    supports_vision: false
    supports_json: true
    data_sovereignty: "China"
    allowed_for_phi: true
