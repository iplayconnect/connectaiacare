# Corpus SEED de testes sintéticos — multiclassificação event_type.
# 24 itens (3 por classe × 8 classes). Use pra validar formato +
# infraestrutura. Versão completa (240 itens) gerada via DeepSeek
# após este seed estar verde.
#
# Cada item carrega:
#   - id: identificador estável (slug + numero)
#   - transcript: texto como sairia do Whisper/Deepgram
#   - expected_event_type: 1 das 8 classes (ground truth)
#   - expected_classification: severity esperada (routine/attention/urgent/critical)
#   - rationale: por que rotulamos assim (auditável por humano)
#   - difficulty: easy | medium | hard (pra weighting de métricas)
#
# Distribuição alvo (no corpus completo):
#   - 60% routine, 25% attention, 12% urgent, 3% critical
#   - 30% easy, 50% medium, 20% hard

# ──────────────────────────── CUIDADO_HIGIENE ────────────────────────────
- id: cuidado_higiene_001
  transcript: "Acabei de trocar a fralda da Dona Maria, ela está limpa e seca, sem irritação na pele."
  expected_event_type: cuidado_higiene
  expected_classification: routine
  rationale: "Troca de fralda de rotina, sem alteração clínica."
  difficulty: easy

- id: cuidado_higiene_002
  transcript: "Dei o banho no Sr. José hoje cedo, ele cooperou bem, hidratei a pele toda. Notei uma pequena vermelhidão no cóccix, vou ficar de olho."
  expected_event_type: cuidado_higiene
  expected_classification: attention
  rationale: "Cuidado de higiene + sinal de alerta dermatológico inicial (possível LPP grau I)."
  difficulty: medium

- id: cuidado_higiene_003
  transcript: "Troquei o curativo da úlcera no calcanhar da Dona Antônia, está com secreção amarelada e cheiro ruim, parece infectado."
  expected_event_type: cuidado_higiene
  expected_classification: urgent
  rationale: "Cuidado de higiene mas com sinal claro de infecção — exige avaliação médica."
  difficulty: medium

