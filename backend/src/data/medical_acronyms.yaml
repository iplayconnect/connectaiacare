# Glossário central de acrônimos médicos e organizacionais
#
# Fonte de verdade pra:
#   - Prompts da Sofia (instruí-la a escrever "Termo Completo (Acrônimo)")
#   - Labels do frontend (corpus review, painel central, dashboards)
#   - Documentação clínica
#
# Decisão Henrique 2026-05-09: sempre escrever termo completo seguido do
# acrônimo entre parênteses na PRIMEIRA menção. Subsequentes podem usar
# só o acrônimo. Pessoas de fora da saúde que entram em contato com a
# plataforma (familiares, gestores, operadores) não devem ficar perdidas.
#
# Estrutura:
#   acronym: ABC
#   full_pt: "Nome Completo em Português"
#   full_en: "English name (opcional, pra audit/FHIR)"
#   category: vital_signs | comorbidity | event | functional | regulatory | org
#   notes: contexto extra opcional

vital_signs:
  - acronym: PA
    full_pt: "Pressão Arterial"
    full_en: "Blood Pressure"
    notes: "Quando sistólica/diastólica separadas: PAS / PAD"
  - acronym: PAS
    full_pt: "Pressão Arterial Sistólica"
    full_en: "Systolic Blood Pressure"
  - acronym: PAD
    full_pt: "Pressão Arterial Diastólica"
    full_en: "Diastolic Blood Pressure"
  - acronym: FC
    full_pt: "Frequência Cardíaca"
    full_en: "Heart Rate"
  - acronym: FR
    full_pt: "Frequência Respiratória"
    full_en: "Respiratory Rate"
  - acronym: SpO2
    full_pt: "Saturação de Oxigênio"
    full_en: "Oxygen Saturation"
    notes: "Também chamada de oximetria de pulso"
  - acronym: T
    full_pt: "Temperatura"
    full_en: "Temperature"
  - acronym: HGT
    full_pt: "Glicemia Capilar"
    full_en: "Capillary Blood Glucose"
    notes: "HGT vem de Hemo-Gluco-Teste"

comorbidities:
  - acronym: DM
    full_pt: "Diabetes Mellitus"
    full_en: "Diabetes Mellitus"
  - acronym: HAS
    full_pt: "Hipertensão Arterial Sistêmica"
    full_en: "Systemic Arterial Hypertension"
  - acronym: DPOC
    full_pt: "Doença Pulmonar Obstrutiva Crônica"
    full_en: "Chronic Obstructive Pulmonary Disease (COPD)"
  - acronym: IC
    full_pt: "Insuficiência Cardíaca"
    full_en: "Heart Failure"
  - acronym: ICC
    full_pt: "Insuficiência Cardíaca Congestiva"
    full_en: "Congestive Heart Failure"
  - acronym: IRC
    full_pt: "Insuficiência Renal Crônica"
    full_en: "Chronic Kidney Disease"
  - acronym: DRC
    full_pt: "Doença Renal Crônica"
    full_en: "Chronic Kidney Disease"
    notes: "Sinônimo de IRC, terminologia mais nova"
  - acronym: AVE
    full_pt: "Acidente Vascular Encefálico"
    full_en: "Stroke"
  - acronym: AVC
    full_pt: "Acidente Vascular Cerebral"
    full_en: "Stroke"
    notes: "AVE é termo mais técnico, AVC é mais usado coloquialmente"

events_acute:
  - acronym: IAM
    full_pt: "Infarto Agudo do Miocárdio"
    full_en: "Acute Myocardial Infarction"
  - acronym: SCA
    full_pt: "Síndrome Coronariana Aguda"
    full_en: "Acute Coronary Syndrome"
  - acronym: TEP
    full_pt: "Tromboembolismo Pulmonar"
    full_en: "Pulmonary Embolism"
  - acronym: TVP
    full_pt: "Trombose Venosa Profunda"
    full_en: "Deep Vein Thrombosis"
  - acronym: HSD
    full_pt: "Hematoma Subdural"
    full_en: "Subdural Hematoma"
  - acronym: HSA
    full_pt: "Hemorragia Subaracnóidea"
    full_en: "Subarachnoid Hemorrhage"
  - acronym: HDA
    full_pt: "Hemorragia Digestiva Alta"
    full_en: "Upper Gastrointestinal Bleeding"
  - acronym: PCR
    full_pt: "Parada Cardiorrespiratória"
    full_en: "Cardiopulmonary Arrest"
    notes: "Em outro contexto: Proteína C Reativa (exame laboratorial)"

functional:
  - acronym: ABVD
    full_pt: "Atividades Básicas de Vida Diária"
    full_en: "Basic Activities of Daily Living"
    notes: "Banhar, vestir, alimentar, locomover, controle esfincteriano"
  - acronym: AIVD
    full_pt: "Atividades Instrumentais de Vida Diária"
    full_en: "Instrumental Activities of Daily Living"
    notes: "Cozinhar, limpar, gerenciar medicação, fazer compras, telefone"
  - acronym: ABVDs
    full_pt: "Atividades Básicas de Vida Diária"
    full_en: "Basic Activities of Daily Living"
    notes: "Plural informal de ABVD"
  - acronym: AIVDs
    full_pt: "Atividades Instrumentais de Vida Diária"
    full_en: "Instrumental Activities of Daily Living"

