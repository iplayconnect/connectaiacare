[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    -q
markers =
    integration: testes que precisam de DB real (skipado no CI padrão)
    slow: testes que levam >1s (threading, sleep)
filterwarnings =
    ignore::DeprecationWarning
